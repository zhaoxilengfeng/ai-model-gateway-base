# 推理网关对比测试配置
# 使用前请填写 endpoint_url、model、namespace

llmd:
  endpoint_url: "http://PLACEHOLDER_LLMD_GATEWAY_IP:80"
  model: "PLACEHOLDER_MODEL_NAME"            # 如 meta-llama/Llama-3.1-8B
  namespace: "PLACEHOLDER_NAMESPACE"         # harness pod 所在 K8s namespace

aibrix:
  endpoint_url: "http://PLACEHOLDER_AIBRIX_GATEWAY_IP:8080"
  model: "PLACEHOLDER_MODEL_NAME"
  namespace: "PLACEHOLDER_NAMESPACE"

defaults:
  harness: inference-perf        # inference-perf | guidellm
  workload: sweep_chatbot.yaml   # profiles/<harness>/ 下的文件名（不含 .in 后缀）
  experiment: concurrency_sweep.yaml
  parallelism: 1                 # 并行 harness pod 数
