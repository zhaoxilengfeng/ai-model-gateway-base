# 推理网关对比测试配置
# 使用前请填写各网关的 endpoint_url、model、namespace

llmd:
  endpoint_url: "http://10.111.96.40:80"        # llm-d-precise-prefix-gw InferenceGateway
  model: "qwen25-7b-instruct"                   # vLLM --served-model-name
  namespace: "llm-d-precise-prefix-gw"          # harness pod 所在 namespace

aibrix:
  endpoint_url: "http://PLACEHOLDER_AIBRIX_GATEWAY_IP:8080"
  model: "PLACEHOLDER_MODEL_NAME"
  namespace: "PLACEHOLDER_NAMESPACE"

defaults:
  harness: inference-perf        # inference-perf | guidellm | vllm-benchmark
  workload: sweep_chatbot.yaml   # profiles/<harness>/ 下的文件名（不含 .in 后缀）
  parallelism: 1                 # 并行 harness pod 数
  data_access_timeout: 600       # 等待 harness data-access pod 就绪的超时（秒）
                                 # 首次运行需拉取镜像，建议设 600s 以上
  metrics_port: 8000             # vLLM metrics 端口（llmdbenchmark 默认 8200，我们用 8000）
