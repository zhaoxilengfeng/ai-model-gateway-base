apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-model-route
  namespace: llm-d-precise-prefix-gw
  labels:
    app: model-routing
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: llm-d-inference-gateway
  rules:
    # glm-4-9b → glm4-9b-pool InferencePool
    - matches:
        - path:
            type: PathPrefix
            value: /v1/
          headers:
            - type: Exact
              name: X-Gateway-Base-Model-Name
              value: glm-4-9b
      backendRefs:
        - group: inference.networking.k8s.io
          kind: InferencePool
          name: glm4-9b-pool
          weight: 1
      timeouts:
        request: 300s
    # qwen25-7b-instruct → precise-prefix-cache-routing InferencePool
    - matches:
        - path:
            type: PathPrefix
            value: /v1/
          headers:
            - type: Exact
              name: X-Gateway-Base-Model-Name
              value: qwen25-7b-instruct
      backendRefs:
        - group: inference.networking.k8s.io
          kind: InferencePool
          name: precise-prefix-cache-routing
          weight: 1
      timeouts:
        request: 300s
    # 默认回退 → qwen（保持向后兼容）
    - matches:
        - path:
            type: PathPrefix
            value: /v1/
      backendRefs:
        - group: inference.networking.k8s.io
          kind: InferencePool
          name: precise-prefix-cache-routing
          weight: 1
      timeouts:
        request: 300s
