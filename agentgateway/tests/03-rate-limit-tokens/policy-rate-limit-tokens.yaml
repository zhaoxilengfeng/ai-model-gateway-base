apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: rate-limit-tokens-policy
  namespace: llm-d-precise-prefix-gw
  labels:
    app: agentgateway-test
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: precise-prefix-cache-routing
  traffic:
    rateLimit:
      local:
        - tokens: 1000     # 每分钟最多 1000 个 token（input+output 合计）
          unit: Minutes
